name: Build RepairPro Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri Windows .exe
        run: npm run tauri build

      - name: Upload Windows Installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: RepairPro-Windows-Installer
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows .exe
        uses: actions/upload-artifact@v4
        with:
          name: RepairPro-Windows-Exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri macOS .app
        run: npm run tauri build

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: RepairPro-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri Linux .AppImage
        run: npm run tauri build

      - name: Upload Linux .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: RepairPro-Linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage
