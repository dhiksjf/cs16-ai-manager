<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peachify Player</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; frame-src https:; object-src 'none';"> 
    <style>
        :root {
            --bg-primary: #0f0f12;
            --bg-secondary: #16161a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #27272a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.025em;
        }

        .config-panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input, select {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        button {
            grid-column: 1 / -1;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .player-box {
            margin-top: 24px;
            display: none;
        }

        .player-box iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Peachify Player</h1>
    
    <div class="config-panel">
        <div class="input-group">
            <label for="tmdb">TMDB ID</label>
            <input type="text" id="tmdb" value="124364">
        </div>
        <div class="input-group">
            <label for="type">Type</label>
            <select id="type">
                <option value="tv" selected>TV Show</option>
                <option value="movie">Movie</option>
            </select>
        </div>
        <div class="input-group">
            <label for="season">Season</label>
            <input type="number" id="season" value="4">
        </div>
        <div class="input-group">
            <label for="episode">Episode</label>
            <input type="number" id="episode" value="7">
        </div>
        <button onclick="play()">▶ Play</button>
    </div>

    <div class="player-box" id="playerBox">
        <iframe id="playerFrame" 
            src="" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    function play() {
        const tmdb = document.getElementById('tmdb').value;
        const type = document.getElementById('type').value;
        const season = document.getElementById('season').value;
        const episode = document.getElementById('episode').value;
        
        let src;
        if (type === "tv") {
            src = `https://peachify.top/embed/tv/${tmdb}/${season}/${episode}`;
        } else {
            src = `https://peachify.top/embed/movie/${tmdb}`;
        }
        
        const playerBox = document.getElementById('playerBox');
        const playerFrame = document.getElementById('playerFrame');
        
        playerFrame.src = src;
        playerBox.style.display = "block";
        playerBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
