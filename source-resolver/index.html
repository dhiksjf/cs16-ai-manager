<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player &middot; Resolver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#050505;
  --bg-surface:#0c0c0c;
  --bg-elevated:#141414;
  --bg-hover:#1c1c1c;
  --accent:#e50914;
  --accent-glow:rgba(229,9,20,0.35);
  --text-primary:#f5f5f5;
  --text-secondary:#a0a0a0;
  --text-muted:#666;
  --border-subtle:#1f1f1f;
  --success:#46d369;
  --radius-sm:6px;
  --radius-md:8px;
  --radius-lg:12px;
  --radius-pill:9999px;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
::selection{background:rgba(229,9,20,0.3);color:var(--text-primary)}

/* Ambient glow */
.ambient-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 40%,rgba(229,9,20,0.03) 0%,transparent 60%)}

.container{position:relative;width:100%;max-width:520px}

/* Brand */
.brand{text-align:center;margin-bottom:32px}
.brand h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;color:var(--text-primary)}
.brand p{font-size:13px;color:var(--text-muted);margin-top:4px}

/* Nav */
.nav-links{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.nav-links a{font-size:12px;font-weight:500;color:var(--text-muted);text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;transition:color 0.2s}
.nav-links a:hover{color:var(--text-primary)}

/* Panel card */
.panel{position:relative;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:28px;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.panel-accent{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(229,9,20,0.3) 50%,transparent 90%);border-radius:var(--radius-md) var(--radius-md) 0 0}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Field */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.field input,.field select{width:100%;background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-primary);padding:10px 14px;border-radius:var(--radius-sm);font-size:14px;outline:none;transition:all 0.2s;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(229,9,20,0.08)}
.field select{cursor:pointer;-webkit-appearance:none;appearance:none}
.field select option{background:var(--bg-surface);color:var(--text-primary)}

/* Play button */
.btn-play{grid-column:1/-1;margin-top:4px;width:100%;background:var(--accent);color:#fff;font-weight:600;font-size:14px;padding:12px;border:none;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;font-family:inherit}
.btn-play:hover{opacity:0.92;transform:scale(1.01)}.btn-play:active{transform:scale(0.98)}

/* Player reveal */
.player-box{margin-top:24px;display:none;animation:playerReveal 0.4s cubic-bezier(0.16,1,0.3,1) forwards}
.player-box .now-playing{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.player-box .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse-dot 2s ease-in-out infinite}
.player-box .now-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px;font-weight:500}
.player-box iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:var(--radius-sm);background:#000;display:block}

/* Keyframes */
@keyframes playerReveal{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

/* Responsive */
@media(max-width:480px){
  .panel-grid{grid-template-columns:1fr}
  .panel{padding:20px}
}
</style>
</head>
<body>
<div class="ambient-glow"></div>

<div class="container">
  <div class="brand">
    <h1>RESOLVER</h1>
    <p>Stream any TMDB content</p>
  </div>

  <div class="nav-links">
    <a href="/resolver/list">Browse</a>
    <a href="/resolver/admin">Admin</a>
  </div>

  <div class="panel">
    <div class="panel-accent"></div>
    <div class="panel-grid">
      <div class="field">
        <label for="tmdb">TMDB ID</label>
        <input type="text" id="tmdb" value="124364" placeholder="1396">
      </div>
      <div class="field">
        <label for="type">Type</label>
        <select id="type" onchange="toggleTvFields()">
          <option value="tv">TV Show</option>
          <option value="movie" selected>Movie</option>
        </select>
      </div>
      <div class="field tv-field">
        <label for="season">Season</label>
        <input type="number" id="season" value="1" min="1">
      </div>
      <div class="field tv-field">
        <label for="episode">Episode</label>
        <input type="number" id="episode" value="1" min="1">
      </div>
      <button class="btn-play" onclick="play()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Play
      </button>
    </div>
  </div>

  <div class="player-box" id="playerBox">
    <div class="now-playing">
      <div class="dot"></div>
      <span class="now-label">Now Playing</span>
    </div>
    <iframe id="playerFrame" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
function toggleTvFields(){
  const isTv=document.getElementById('type').value==='tv';
  document.querySelectorAll('.tv-field').forEach(el=>{
    el.style.opacity=isTv?1:0.4;
    el.style.pointerEvents=isTv?'auto':'none';
  });
}
function play(){
  const tmdb=document.getElementById('tmdb').value;
  const type=document.getElementById('type').value;
  const season=document.getElementById('season').value;
  const episode=document.getElementById('episode').value;
  let src=type==='tv'?'https://peachify.top/embed/tv/'+tmdb+'/'+season+'/'+episode:'https://peachify.top/embed/movie/'+tmdb;
  const box=document.getElementById('playerBox');
  const frame=document.getElementById('playerFrame');
  frame.src=src;box.style.display='block';box.scrollIntoView({behavior:'smooth'});
}
toggleTvFields();
</script>
</body>
</html>
